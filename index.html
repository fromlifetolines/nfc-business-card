<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>數位名片</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    /* 這裡負責科技感動畫與毛玻璃特效 */
    body { background-color: #0A0A0A; color: white; margin: 0; overflow: hidden; font-family: sans-serif; }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    /* 浮現動畫 */
    .animate-float-up { animation: floatUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes floatUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* 按鈕掃光動畫 */
    .shimmer-btn { position: relative; overflow: hidden; }
    .shimmer-btn::after {
      content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
      transform: skewX(-20deg); animation: shimmer 2.5s infinite;
    }
    @keyframes shimmer { 100% { left: 200%; } }
    
    /* 背景科技光暈 */
    .bg-glow-1 { position: absolute; top: -20%; left: -10%; width: 70vw; height: 70vw; background: rgba(0, 240, 255, 0.15); filter: blur(100px); border-radius: 50%; z-index: -1;}
    .bg-glow-2 { position: absolute; bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: rgba(138, 43, 226, 0.15); filter: blur(100px); border-radius: 50%; z-index: -1;}
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  
  <div class="bg-glow-1"></div>
  <div class="bg-glow-2"></div>

  <main class="glass-card w-full max-w-[380px] p-8 rounded-[2rem] shadow-2xl flex flex-col items-center text-center animate-float-up relative z-10">

    <div class="w-24 h-24 rounded-full overflow-hidden border border-[#00F0FF]/30 p-1 mb-6 shadow-[0_0_15px_rgba(0,240,255,0.2)]">
      <img src="https://i.pravatar.cc/150?u=king" alt="照片" class="w-full h-full rounded-full object-cover">
    </div>

    <h1 class="text-3xl font-bold tracking-widest mb-2">王大明</h1>
    <p class="text-[#00F0FF] text-sm tracking-widest mb-8">王牌金牌業務 / 房地產顧問</p>

    <a href="#" class="shimmer-btn w-full bg-[#050505] border border-[#00F0FF] text-[#00F0FF] rounded-xl py-3.5 px-6 font-bold tracking-wider flex items-center justify-center gap-2 mb-8 hover:bg-[#00F0FF] hover:text-black transition-colors duration-300">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
      點擊存入通訊錄
    </a>

    <div class="flex gap-5 w-full justify-center">
      <a href="https://你的網站.com" class="p-3 rounded-full bg-white/5 border border-white/10 text-gray-400 hover:text-white hover:bg-white/20 transition-all hover:scale-110">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
      </a>
      <a href="mailto:king@example.com" class="p-3 rounded-full bg-white/5 border border-white/10 text-gray-400 hover:text-white hover:bg-white/20 transition-all hover:scale-110">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
      </a>
    </div>

    </main>
</body>
</html>
